<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DROPBOX MUSIC PLAYER</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="player-shell">
    <header class="player-header">
      <div>
        <span class="brand">DROPBOX MUSIC PLAYER</span>
        <p class="subtitle">DROPBOX MUSIC PLAYER playback interface</p>
      </div>
      <button class="menu-btn"><i class='bx bx-menu'></i></button>
    </header>

    <section class="player-card">
      <div class="cover-frame">
        <img id="coverImage" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=800&q=80" alt="Album cover">
      </div>
      <div class="track-details">
        <h1 id="trackTitle">Street Lights</h1>
        <p id="trackArtist">By Audio Sample</p>
      </div>

      <div class="audio-section">
        <audio id="audio" preload="metadata"></audio>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
        <div class="progress-wrapper">
          <input id="progress" type="range" min="0" max="100" value="0">
        </div>
      </div>

      <div class="controls-row">
        <button class="control-btn" id="prevBtn" title="Previous"><i class='bx bx-skip-previous'></i></button>
        <button class="control-btn play-btn" id="playBtn" title="Play/Pause"><i class='bx bx-play'></i></button>
        <button class="control-btn" id="nextBtn" title="Next"><i class='bx bx-skip-next'></i></button>
      </div>

      <div class="volume-row">
        <i class='bx bx-volume-low'></i>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8">
      </div>
    </section>

    <section class="playlist-panel">
      <div class="panel-header">
        <h2>Playlist</h2>
        <span id="trackCount">3 tracks</span>
      </div>
      <div class="upload-row">
        <label for="fileInput" class="upload-label"><i class='bx bx-upload'></i> Upload Music</label>
        <input id="fileInput" type="file" accept="audio/*">
      </div>
      <ul id="playlist" class="playlist"></ul>
    </section>
  </div>

  <script>
    const playlist = [
      {
        title: 'Street Lights',
        artist: 'Audio Sample',
        cover: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=800&q=80',
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
      },
      {
        title: 'Night Rider',
        artist: 'Sample Beats',
        cover: 'https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&w=800&q=80',
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
      },
      {
        title: 'Silent Drive',
        artist: 'Ambient Waves',
        cover: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80',
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
      }
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progress = document.getElementById('progress');
    const currentTime = document.getElementById('currentTime');
    const duration = document.getElementById('duration');
    const volume = document.getElementById('volume');
    const playlistEl = document.getElementById('playlist');
    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const coverImage = document.getElementById('coverImage');
    const trackCount = document.getElementById('trackCount');
    const fileInput = document.getElementById('fileInput');
    const uploadedCover = 'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=800&q=80';

    let currentIndex = 0;
    let isPlaying = false;

    function loadTrack(index) {
      const track = playlist[index];
      audio.src = track.src;
      trackTitle.textContent = track.title;
      trackArtist.textContent = track.artist;
      coverImage.src = track.cover;
      progress.value = 0;
      currentTime.textContent = '0:00';
      duration.textContent = '0:00';
      updatePlaylistUI();
    }

    function playTrack() {
      audio.play();
      isPlaying = true;
      playBtn.innerHTML = "<i class='bx bx-pause'></i>";
      document.body.classList.add('playing');
    }

    function pauseTrack() {
      audio.pause();
      isPlaying = false;
      playBtn.innerHTML = "<i class='bx bx-play'></i>";
      document.body.classList.remove('playing');
    }

    function togglePlay() {
      if (!audio.src) loadTrack(currentIndex);
      isPlaying ? pauseTrack() : playTrack();
    }

    function prevTrack() {
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentIndex);
      playTrack();
    }

    function nextTrack() {
      currentIndex = (currentIndex + 1) % playlist.length;
      loadTrack(currentIndex);
      playTrack();
    }

    function updatePlaylistUI() {
      playlistEl.innerHTML = '';
      playlist.forEach((track, index) => {
        const item = document.createElement('li');
        item.className = index === currentIndex ? 'playlist-item active' : 'playlist-item';
        item.innerHTML = `<div><strong>${track.title}</strong><span>${track.artist}</span></div><i class='bx bx-play-circle'></i>`;
        item.addEventListener('click', () => {
          currentIndex = index;
          loadTrack(index);
          playTrack();
        });
        playlistEl.appendChild(item);
      });
      trackCount.textContent = `${playlist.length} tracks`;
    }

    function handleUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const objectURL = URL.createObjectURL(file);
      const title = file.name.replace(/\.[^/.]+$/, '');
      playlist.push({
        title,
        artist: 'Uploaded Track',
        cover: uploadedCover,
        src: objectURL
      });
      currentIndex = playlist.length - 1;
      loadTrack(currentIndex);
      playTrack();
      updatePlaylistUI();
      event.target.value = '';
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
        currentTime.textContent = formatTime(audio.currentTime);
        duration.textContent = formatTime(audio.duration);
      }
    });

    audio.addEventListener('ended', nextTrack);

    progress.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
      }
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    fileInput.addEventListener('change', handleUpload);
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);

    function formatTime(time) {
      const minutes = Math.floor(time / 60) || 0;
      const seconds = Math.floor(time % 60) || 0;
      return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    loadTrack(currentIndex);
    updatePlaylistUI();
  </script>
</body>
</html>
