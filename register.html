<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DROPBOX MUSIC PLAYER</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <i class='bx bx-music'></i>
                DROPBOX MUSIC PLAYER
            </div>
            <h2>Join DROPBOX MUSIC PLAYER</h2>
            <form class="auth-form">
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-envelope'></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-user-circle'></i>
                    <select required>
                        <option value="">Select Account Type</option>
                        <option value="listener">Listener</option>
                        <option value="artist">Artist</option>
                    </select>
                </div>
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" required>
                        <span>I agree to the Terms & Conditions</span>
                    </label>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="login">Login</a></p>
            <div class="social-login">
                <p>Or register with</p>
                <div class="social-buttons">
                    <button class="social-btn google">
                        <i class='bx bxl-google'></i>
                        Google
                    </button>
                    <button class="social-btn facebook">
                        <i class='bx bxl-facebook'></i>
                        Facebook
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple form validation
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = this.querySelector('input[type="text"]').value;
            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelector('input[type="password"]').value;
            const confirmPassword = this.querySelectorAll('input[type="password"]')[1].value;
            const accountType = this.querySelector('select').value;
            const agreeTerms = this.querySelector('input[type="checkbox"]').checked;

            if (name && email && password && confirmPassword && accountType && agreeTerms) {
                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }
                alert('Registration functionality would connect to backend here');
                // In a real app, this would send a request to the server
            } else {
                alert('Please fill in all fields and agree to terms');
            }
        });
    </script>
</body>
</html>
