version: '3.8'

services:
  app:
    image: dropbox-music-player:latest
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/dropbox-music
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data: